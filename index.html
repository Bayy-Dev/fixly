<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FIXLY — Tools Hub</title>
  <meta name="description" content="FIXLY Hub — All-in-One Downloader, HD Photo, HD Video & IQC Generator by Yorii Senpaii." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Top Bar ── -->
  <header class="topbar" id="topbar">
    <div class="topbar-logo">
      <div class="logo-mark">✦</div>
      <span class="logo-name">FIXLY</span>
    </div>
    <!-- Desktop nav links -->
    <nav class="desktop-nav" aria-label="Navigasi desktop">
      <button class="dnav-btn active" data-section="aio">Downloader</button>
      <button class="dnav-btn" data-section="hdfoto">HD Foto</button>
      <button class="dnav-btn" data-section="hdvideo">HD Video</button>
      <button class="dnav-btn" data-section="iqc">IQC</button>
    </nav>
    <div class="topbar-credit">by <span>Yorii Senpaii</span></div>
  </header>

  <!-- ── Main ── -->
  <main id="main">

    <!-- Hero -->
    <section class="hero" id="hero">
      <div class="hero-pill">✦ Tools Hub</div>
      <h1 class="hero-title">FIXLY</h1>
      <p class="hero-sub">Download media, enhance foto &amp; video,<br>generate IQC — semua di sini.</p>
      <p class="hero-credit">by <span>Yorii Senpaii</span></p>
    </section>

    <!-- Orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <!-- Sections -->
    <div class="page-wrap">

      <section class="tool-page active" id="section-aio">
        <div id="aio-root"></div>
      </section>

      <section class="tool-page" id="section-hdfoto">
        <div id="hdfoto-root"></div>
      </section>

      <section class="tool-page" id="section-hdvideo">
        <div id="hdvideo-root"></div>
      </section>

      <section class="tool-page" id="section-iqc">
        <div id="iqc-root"></div>
      </section>

    </div>
  </main>

  <!-- ── Bottom Nav (Mobile) ── -->
  <nav class="bottomnav" id="bottomnav" aria-label="Navigasi bawah">

    <button class="bnav-btn active" data-section="aio" id="bnav-aio">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span>Download</span>
    </button>

    <button class="bnav-btn" data-section="hdfoto" id="bnav-hdfoto">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2.5"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>HD Foto</span>
    </button>

    <button class="bnav-btn" data-section="hdvideo" id="bnav-hdvideo">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span>HD Video</span>
    </button>

    <button class="bnav-btn" data-section="iqc" id="bnav-iqc">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 17h0M17 14h3"/>
      </svg>
      <span>IQC</span>
    </button>

  </nav>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Scripts (load order matters) -->
  <script src="js/utils.js"></script>
  <script src="endpoints/aio.js"></script>
  <script src="endpoints/hdfoto.js"></script>
  <script src="endpoints/hdvideo.js"></script>
  <script src="endpoints/iqc.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
